        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    SignupBody:
      type: object
      additionalProperties: false
      required:
        - phone
        - password
        - first_name
        - last_name
        - email
      properties:
        phone:
          type: string
        password:
          type: string
          minLength: 8
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
    LoginBody:
      type: object
      additionalProperties: false
      required:
        - phone
        - password
      properties:
        phone:
          type: string
        password:
          type: string
    EmailVerifyConfirmBody:
      type: object
      additionalProperties: false
      required:
        - code
      properties:
        code:
          type: string
    ForgotPasswordRequestBody:
      type: object
      additionalProperties: false
      required:
        - email
      properties:
        email:
          type: string
          format: email
    ForgotPasswordResetBody:
      type: object
      additionalProperties: false
      required:
        - email
        - code
        - new_password
      properties:
        email:
          type: string
          format: email
        code:
          type: string
        new_password:
          type: string
          minLength: 8
    KYCSubmitBody:
      type: object
      additionalProperties: false
      required:
        - id_type
        - id_number
      properties:
        id_type:
          type: string
          enum: [NIN, BVN]
        id_number:
          type: string
    KYCSubmission:
      type: object
      required:
        - id
        - user_id
        - id_type
        - id_number
        - status
        - submitted_at
      properties:
        id:
          type: string
        user_id:
          type: string
        id_type:
          type: string
        id_number:
          type: string
        status:
          type: string
          enum: [VERIFIED, REJECTED]
        rejection_reason:
          type: string
          nullable: true
        tier_granted:
          type: string
          nullable: true
        submitted_by:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
        verified_at:
          type: string
          format: date-time
          nullable: true
    KYCSubmissionList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/KYCSubmission"
    KYCHint:
      type: object
      additionalProperties:
        type: string
    RefreshBody:
      type: object
      additionalProperties: false
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    LogoutBody:
      type: object
      additionalProperties: false
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    AuthTokens:
      type: object
      required:
        - user_id
        - account_number
        - access_token
        - refresh_token
        - access_expires_at
        - refresh_expires_at
      properties:
        user_id:
          type: string
        account_number:
          type: string
        access_token:
          type: string
        refresh_token:
          type: string
        access_expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time
        display_card:
          $ref: "#/components/schemas/DisplayCardInput"
          description: |
            Server-issued identity credential. Clients cache this for use in
            every PaymentRequest they publish. Optional on login responses
            (clients should fall back to GET /v1/identity/display-card); always
            populated on signup.
    Me:
      type: object
      required:
        - user_id
        - phone
        - account_number
        - kyc_tier
        - first_name
        - last_name
        - email
        - email_verified
      properties:
        user_id:
          type: string
        phone:
          type: string
        account_number:
          type: string
        kyc_tier:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        email_verified:
          type: boolean
        display_card:
          $ref: "#/components/schemas/DisplayCardInput"
          description: |
            Freshly-issued DisplayCard for the caller. Optional so a transient
            bank-key or signing failure doesn't break /me — clients fall back
            to GET /v1/identity/display-card.
    ResolvedAccount:
      type: object
      required:
        - account_number
        - masked_name
      properties:
        account_number:
          type: string
        masked_name:
          type: string
    InitiateTransferBody:
      type: object
      additionalProperties: false
      required:
        - receiver_account_number
        - amount_kobo
        - reference
        - pin
      properties:
        receiver_account_number:
          type: string
        amount_kobo:
          type: integer
          format: int64
        reference:
          type: string
        pin:
          type: string
          description: 4- or 6-digit transaction PIN. Never logged.
    SetPinBody:
      type: object
      additionalProperties: false
      required:
        - pin
      properties:
        pin:
          type: string
          description: 4- or 6-digit transaction PIN.
    Session:
      type: object
      required:
        - id
        - user_agent
        - ip
        - created_at
        - expires_at
        - is_current
      properties:
        id:
          type: string
        user_agent:
          type: string
        ip:
          type: string
        device_id:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        is_current:
          type: boolean
    SessionList:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Session"
    RevokeAllOthersResponse:
      type: object
      required:
        - revoked
      properties:
        revoked:
          type: integer
          format: int32
    DeviceSessionRequest:
      type: object
      additionalProperties: false
      required:
        - device_id
      properties:
        device_id:
          type: string
          description: |
            Caller's registered device identifier (returned by
            `POST /v1/devices`). Must be active and owned by the authenticated
            user, otherwise the server returns 403.
        scope:
          type: string
          description: |
            Capability scope this token grants on-device. Defaults to
            `offline_pay`. Reserved for future tiers; unknown scopes 400.
          enum:
            - offline_pay
    DeviceSessionResponse:
      type: object
      required:
        - token
        - server_public_key
        - key_id
        - issued_at
        - expires_at
        - scope
      properties:
        token:
          type: string
          description: |
            Compact base64url-encoded `header.claims.signature` blob signed
            with Ed25519. The device verifies it locally against
            `server_public_key`.
        server_public_key:
          type: string
          format: byte
          description: 32-byte Ed25519 public key the device should cache.
        key_id:
          type: string
          description: Identifier of the signing key (for rotation).
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        scope:
          type: string
          enum:
            - offline_pay
    DeviceSessionPublicKey:
      type: object
      required:
        - key_id
        - public_key
        - active_from
      properties:
        key_id:
          type: string
        public_key:
          type: string
          format: byte
        active_from:
          type: string
          format: date-time
        retired_at:
          type: string
          format: date-time
          nullable: true
    DeviceSessionPublicKeys:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/DeviceSessionPublicKey"
    Transfer:
      type: object
      required:
        - id
        - sender_user_id
        - receiver_user_id
        - receiver_account_number
        - amount_kobo
        - status
        - reference
        - created_at
      properties:
        id:
          type: string
        sender_user_id:
          type: string
        receiver_user_id:
          type: string
        sender_display_name:
          type: string
          nullable: true
          description: |
            Best-effort "First Last" rendering of the sender pulled from the
            users table at read time. Nullable so the API stays forward-
            compatible if the join ever falls back (e.g. deleted user row).
        receiver_display_name:
          type: string
          nullable: true
          description: |
            Best-effort "First Last" rendering of the receiver. Mirror of
            `sender_display_name`.
        receiver_account_number:
          type: string
        amount_kobo:
          type: integer
          format: int64
        status:
          type: string
          enum: [ACCEPTED, PROCESSING, SETTLED, FAILED]
        reference:
          type: string
        failure_reason:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        settled_at:
          type: string
          format: date-time
          nullable: true
    TransferList:
      type: object
      required:
        - items
        - limit
        - offset
      properties:
