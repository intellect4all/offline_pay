    RecoverOfflineCeilingResponse:
      type: object
      required:
        - ceiling_id
        - quarantined_kobo
        - release_after
      properties:
        ceiling_id:
          type: string
        quarantined_kobo:
          type: integer
          format: int64
          description: |
            Amount held in quarantine. Funds are released to the main
            wallet by the expiry sweep once `release_after` passes.
            Late-arriving offline claims against this ceiling will
            settle first and reduce the released amount accordingly.
        release_after:
          type: string
          format: date-time
          description: |
            Wall-clock time after which the expiry sweep returns the
            remaining lien balance to the main wallet. Equals the
            ceiling's original expiry plus the auto-settle timeout plus
            a 30-minute grace.
    CurrentCeilingResponse:
      type: object
      required:
        - present
      properties:
        present:
          type: boolean
          description: |
            False when the payer has no offline wallet (no ACTIVE or
            RECOVERY_PENDING ceiling). All other fields are omitted or
            zero in that case.
        ceiling_id:
          type: string
        status:
          type: string
          description: ACTIVE or RECOVERY_PENDING.
        ceiling_kobo:
          type: integer
          format: int64
        settled_kobo:
          type: integer
          format: int64
          description: |
            Total settled across every payment token issued against
            this ceiling. `ceiling_kobo - settled_kobo = remaining_kobo`.
        remaining_kobo:
          type: integer
          format: int64
          description: |
            The amount the lien would return to main if the ceiling
            released right now. Used for the offline-wallet card and
            to cross-check against the lien account balance.
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        release_after:
          type: string
          format: date-time
          description: |
            Populated only when status is RECOVERY_PENDING. After this
            instant the expiry sweep releases the remaining lien back
            to main.
