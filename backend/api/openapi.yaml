openapi: 3.1.0
info:
  title: OfflinePay BFF
  version: 0.1.0
servers:
  - url: http://localhost:8082
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness probe.
      security: []
      responses:
        "200":
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v1/auth/signup:
    post:
      operationId: postV1AuthSignup
      summary: Register a new user (phone + password + profile). Lands at KYC tier TIER_1.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "200":
          description: Account created. Auth tokens issued. Email-verification OTP dispatched.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Phone or email already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/login:
    post:
      operationId: postV1AuthLogin
      summary: Authenticate with phone + password.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Auth tokens issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/email/verify/request:
    post:
      operationId: postV1AuthEmailVerifyRequest
      summary: Dispatch an email-verification OTP for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: OTP dispatched (or no-op if already verified).
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/email/verify/confirm:
    post:
      operationId: postV1AuthEmailVerifyConfirm
      summary: Confirm the email-verification OTP for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailVerifyConfirmBody"
      responses:
        "204":
          description: Email verified.
        "401":
          description: Invalid OTP or missing bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/forgot-password/request:
    post:
      operationId: postV1AuthForgotPasswordRequest
      summary: Dispatch a password-reset OTP by email. Always returns 204 (no enumeration).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequestBody"
      responses:
        "204":
          description: Request accepted (a code is dispatched iff the email is registered).
  /v1/auth/forgot-password/reset:
    post:
      operationId: postV1AuthForgotPasswordReset
      summary: Reset a password by email + OTP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordResetBody"
      responses:
        "204":
          description: Password reset.
        "401":
          description: Invalid OTP or credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "400":
          description: Validation error on the new password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/refresh:
    post:
      operationId: postV1AuthRefresh
      summary: Rotate a refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshBody"
      responses:
        "200":
          description: New auth tokens issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Refresh token invalid or revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/logout:
    post:
      operationId: postV1AuthLogout
      summary: Revoke a refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutBody"
      responses:
        "204":
          description: Refresh token revoked (idempotent).
  /v1/auth/pin:
    post:
      operationId: postV1AuthPin
      summary: Set (or replace) the authenticated user's transaction PIN.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPinBody"
      responses:
        "204":
          description: PIN stored.
        "400":
          description: PIN format invalid (must be 4 or 6 digits).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/sessions:
    get:
      operationId: getV1AuthSessions
      summary: List the authenticated user's active refresh sessions.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active sessions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionList"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/sessions/{id}/revoke:
    post:
      operationId: postV1AuthSessionsIdRevoke
      summary: Revoke a single session owned by the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session revoked (idempotent for already-revoked rows).
        "400":
          description: |
            Cannot revoke the current session via this endpoint. Use
            `/v1/auth/logout` with the refresh token instead.
            `code=cannot_revoke_current`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Session not found or not owned by the caller.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/sessions/revoke-all-others:
    post:
      operationId: postV1AuthSessionsRevokeAllOthers
      summary: Revoke every session for the caller except the current one.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Count of revoked sessions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAllOthersResponse"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/device-session:
    post:
      operationId: postV1AuthDeviceSession
      summary: |
        Issue an Ed25519-signed device session token. The token authorizes
        offline-scope operations on this device (PIN/biometric-gated) when the
        app starts cold without internet. Token verification is purely local
        against the embedded `server_public_key`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceSessionRequest"
      responses:
        "200":
          description: Device session token + server pubkey.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceSessionResponse"
        "400":
          description: Invalid request (missing device_id, unknown scope).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Device not owned by caller, or device deactivated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/auth/device-session/public-keys:
    get:
      operationId: getV1AuthDeviceSessionPublicKeys
      summary: |
        Return the active server public key(s) the device should trust when
        verifying device session tokens offline. Cached at registration; the
        device falls back to the cache if this endpoint is unreachable.
      security: []
      responses:
        "200":
          description: Active server public keys for device-session token verification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceSessionPublicKeys"
  /v1/me:
    get:
      operationId: getV1Me
      summary: Fetch the authenticated user's profile.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/identity/display-card:
    get:
      operationId: getV1IdentityDisplayCard
      summary: Fetch the caller's currently-issued DisplayCard.
      description: |
        Receivers embed the DisplayCard in every PaymentRequest they publish.
        Clients should refresh this on login and whenever the name/account
        shown in the UI changes.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Display card.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisplayCardInput"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream error (bank key unavailable, signing failure).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/kyc/submit:
    post:
      operationId: postV1KycSubmit
      summary: Submit a NIN (promotes to TIER_2) or BVN (promotes to TIER_3).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KYCSubmitBody"
      responses:
        "200":
          description: Submission recorded (verified or rejected).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KYCSubmission"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/kyc/submissions:
    get:
      operationId: getV1KycSubmissions
      summary: List the caller's KYC submission history.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Submissions, newest-first.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KYCSubmissionList"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/kyc/hint:
    get:
      operationId: getV1KycHint
      summary: Dev helper — expected mock NIN/BVN for the caller's phone.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Map of id_type → expected value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KYCHint"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/accounts/resolve/{accountNumber}:
    get:
      operationId: getV1AccountsResolveAccountNumber
      summary: Resolve an account number to a masked owner label.
      security:
        - bearerAuth: []
      parameters:
        - name: accountNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolvedAccount"
        "400":
          description: Malformed account number.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/transfers:
    post:
      operationId: postV1Transfers
      summary: Initiate a user-to-user transfer.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateTransferBody"
      responses:
        "200":
          description: Transfer accepted (or existing transfer for repeated reference).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transfer"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: |
            Missing or invalid bearer token, or transaction PIN rejected.
            `code=pin_bad` indicates a wrong PIN (caller may retry).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "402":
          description: |
            KYC-tier limit check failed. Codes:
              * `kyc_tier_blocked`   — sender has no KYC (UNVERIFIED).
              * `exceeds_single_limit` — amount above tier's single-txn cap.
              * `exceeds_daily_limit`  — this transfer would push today's
                cumulative total above the tier's daily cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |
            Transfer blocked by fraud-scoring rules. Codes:
              * `fraud_block` — a rule (e.g. velocity_spike) returned BLOCK.
                Safe to retry later; the account is not suspended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Receiver account not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Self-transfer rejected, or `code=pin_not_set` indicating the
            caller must first POST /v1/auth/pin before transferring.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "423":
          description: |
            Transaction PIN locked after too many wrong attempts.
            `code=pin_locked`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: getV1Transfers
      summary: List transfers for the authenticated user (sender or receiver).
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Transfer list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferList"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/wallet/fund-offline:
    post:
      operationId: postV1WalletFundOffline
      summary: Debit main wallet, place lien, and issue a fresh ceiling token.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FundOfflineBody"
      responses:
        "200":
          description: Ceiling token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FundOfflineResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Permission denied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Precondition failed (e.g. insufficient main balance, active ceiling).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream settlement server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/wallet/balances:
    get:
      operationId: getV1WalletBalances
      summary: Fetch all five account balances for the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Balances snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetBalancesResponse"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream settlement server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/wallet/move-to-main:
    post:
      operationId: postV1WalletMoveToMain
      summary: Revoke active ceiling and release lien back to the main wallet.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Funds released to main wallet.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoveToMainResponse"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Precondition failed (e.g. in-flight unsettled claims).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream settlement server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/wallet/recover-offline-ceiling:
    post:
      operationId: postV1WalletRecoverOfflineCeiling
      summary: |
        Begin recovery of a ceiling whose device-side token was lost. The
        lien stays locked during a quarantine window (expires_at +
        auto_settle_timeout + grace) so any offline-carried claims can
        still land; the expiry sweep then returns the remaining lien to
        the main wallet.
      description: |
        Use this ONLY when the device has genuinely lost the ceiling
        token (e.g. data corruption) — you cannot sign offline payments
        with it. Unsettled server-visible claims block the call with
        409 `unsettled_claims`; wait for those to settle first.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Ceiling moved into RECOVERY_PENDING. Funds will return to main after `release_after`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecoverOfflineCeilingResponse"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No active ceiling on file for this user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Unsettled claims outstanding; recovery refused.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/wallet/ceiling/current:
    get:
      operationId: getV1WalletCeilingCurrent
      summary: |
        Fetch the payer's current non-terminal ceiling (ACTIVE or
        RECOVERY_PENDING) with live settled / remaining totals. Used by
        the mobile client to render the tri-state offline-wallet card
        and to converge local state after a recovery.
      description: |
        Always returns 200 — `present: false` means the payer has no
        offline wallet right now. `present: true` carries the full
        status snapshot; `release_after` is populated only when status
        is RECOVERY_PENDING.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current ceiling snapshot (or absent).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentCeilingResponse"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/wallet/refresh-ceiling:
    post:
      operationId: postV1WalletRefreshCeiling
      summary: Consume the remaining ceiling into a fresh one with a new amount/TTL.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshCeilingBody"
      responses:
        "200":
          description: New ceiling token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshCeilingResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Precondition failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream settlement server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/wallet/top-up:
    post:
      operationId: postV1WalletTopUp
      summary: Dev-only endpoint to credit the user's main wallet with fake funds.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopUpBody"
      responses:
        "200":
          description: Balance credited.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopUpResponse"
        "400":
          description: Validation error (amount out of range).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Endpoint disabled (production).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/settlement/sync:
    post:
      operationId: postV1SettlementSync
      summary: Sync payer-side and receiver-side settled transactions for reconciliation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncBody"
      responses:
        "200":
          description: Sync result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream settlement server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/settlement/claims:
    post:
      operationId: postV1SettlementClaims
      summary: Submit a batch of offline payment tokens for claim (Phase 4a).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitClaimBody"
      responses:
        "200":
          description: Batch receipt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchReceipt"
        "400":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden.
          content:
            application/json:
