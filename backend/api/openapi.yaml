            - SETTLEMENT_BATCH_STATUS_RECEIVED
            - SETTLEMENT_BATCH_STATUS_PROCESSING
            - SETTLEMENT_BATCH_STATUS_COMPLETED
            - SETTLEMENT_BATCH_STATUS_FAILED
        submitted_at:
          type: string
          format: date-time
        processed_at:
          type: string
          format: date-time
          nullable: true
        results:
          type: array
          items:
