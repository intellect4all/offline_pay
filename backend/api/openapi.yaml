      type: object
      additionalProperties: false
      required:
        - payer_id
        - payee_id
        - amount_kobo
        - sequence_number
        - remaining_ceiling_kobo
        - timestamp
        - ceiling_token_id
        - payer_signature
        - session_nonce
        - request_hash
      properties:
        payer_id:
          type: string
        payee_id:
          type: string
        amount_kobo:
          type: integer
          format: int64
        sequence_number:
          type: integer
          format: int64
        remaining_ceiling_kobo:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time
        ceiling_token_id:
          type: string
        payer_signature:
          type: string
          format: byte
        session_nonce:
          type: string
          format: byte
          description: 16-byte nonce from the PaymentRequest; single-use per receiver.
        request_hash:
          type: string
          format: byte
          description: sha256(canonical(PaymentRequest)) — server recomputes to detect tampering.
    CeilingTokenInput:
      type: object
      additionalProperties: false
      required:
        - id
        - payer_id
        - ceiling_amount_kobo
        - issued_at
        - expires_at
        - sequence_start
        - payer_public_key
        - bank_key_id
        - bank_signature
        - status
      properties:
        id:
          type: string
        payer_id:
          type: string
        ceiling_amount_kobo:
          type: integer
          format: int64
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        sequence_start:
          type: integer
          format: int64
        payer_public_key:
          type: string
          format: byte
        bank_key_id:
          type: string
        bank_signature:
          type: string
          format: byte
        status:
          type: string
          enum:
            - CEILING_STATUS_UNSPECIFIED
            - CEILING_STATUS_ACTIVE
            - CEILING_STATUS_EXPIRED
            - CEILING_STATUS_EXHAUSTED
            - CEILING_STATUS_REVOKED
    DisplayCardInput:
      type: object
      additionalProperties: false
      description: |
        Server-issued identity credential. The receiver embeds this in every
        PaymentRequest they publish; the payer verifies the server signature
        against the cached bank public key to confirm display_name really
        belongs to user_id.
      required:
        - user_id
        - display_name
        - account_number
        - issued_at
        - bank_key_id
        - server_signature
      properties:
        user_id:
          type: string
        display_name:
          type: string
        account_number:
          type: string
        issued_at:
          type: string
          format: date-time
        bank_key_id:
          type: string
        server_signature:
          type: string
          format: byte
    PaymentRequestInput:
      type: object
      additionalProperties: false
      description: |
        Receiver-signed invoice the payer counter-signs before issuing a
        PaymentToken. amount_kobo=0 is the "unbound" sentinel (P2P fallback:
        the payer enters the amount themselves).
      required:
        - receiver_id
        - receiver_display_card
        - amount_kobo
        - session_nonce
        - issued_at
        - expires_at
        - receiver_device_pubkey
        - receiver_signature
      properties:
        receiver_id:
          type: string
        receiver_display_card:
          $ref: "#/components/schemas/DisplayCardInput"
        amount_kobo:
          type: integer
          format: int64
          description: 0 means "unbound" — the payer picks the amount.
        session_nonce:
          type: string
          format: byte
          description: 16 random bytes; single-use per receiver.
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        receiver_device_pubkey:
          type: string
          format: byte
        receiver_signature:
          type: string
          format: byte
    SubmitClaimBody:
      type: object
      additionalProperties: false
      required:
        - client_batch_id
        - tokens
        - ceilings
        - requests
      properties:
        client_batch_id:
          type: string
        tokens:
          type: array
          items:
            $ref: "#/components/schemas/PaymentTokenInput"
        ceilings:
          type: array
          items:
            $ref: "#/components/schemas/CeilingTokenInput"
        requests:
          type: array
          description: |
            Receiver-signed PaymentRequests each token counter-signs. Match
            by session_nonce — every token must have exactly one request.
          items:
            $ref: "#/components/schemas/PaymentRequestInput"
