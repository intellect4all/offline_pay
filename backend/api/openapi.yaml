              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Upstream error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/keys/sealed-box-pubkey:
    get:
      operationId: getV1KeysSealedBoxPubkey
      summary: Fetch the server's X25519 sealed-box public key (keyless).
