# Resource limits sized for a 4 GB / 2 vCPU VPS (e.g. Vultr "Cloud Compute 2").
# Memory ceiling across services ~3.5 GB; host keeps ~600 MB headroom.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: offlinepay
      POSTGRES_PASSWORD: offlinepay
      POSTGRES_DB: offlinepay
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offlinepay"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 1.0

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "64mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 96m
    cpus: 0.25

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--max_payload", "1MB"]
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25

  adminapi:
    build:
      context: .
      dockerfile: backend/Dockerfile.adminapi
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      OFFLINEPAY_ENV: ${OFFLINEPAY_ENV:-local}
      OFFLINEPAY_LOG_FORMAT: ${OFFLINEPAY_LOG_FORMAT:-json}
      OFFLINEPAY_LOG_LEVEL: ${OFFLINEPAY_LOG_LEVEL:-info}

      DB_URL: postgres://offlinepay:offlinepay@postgres:5432/offlinepay?sslmode=disable
      ADMIN_HTTP_ADDR: ${ADMIN_HTTP_ADDR:-:8088}
      ADMIN_CORS_ORIGIN: ${ADMIN_CORS_ORIGIN:-http://localhost:3000}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-dev-insecure-adminapi-secret-change-me-0123456789}
      ADMIN_JWT_AUDIENCE: ${ADMIN_JWT_AUDIENCE:-offlinepay-admin}
      ADMIN_ACCESS_TTL_MINUTES: ${ADMIN_ACCESS_TTL_MINUTES:-15}
      ADMIN_REFRESH_TTL_HOURS: ${ADMIN_REFRESH_TTL_HOURS:-168}
      MIGRATE_ON_BOOT: ${MIGRATE_ON_BOOT:-true}

      GOMEMLIMIT: 170MiB
      GOMAXPROCS: 1

      OTEL_EXPORTER_OTLP_ENDPOINT: "tempo:4317"
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_SERVICE_NAME: offlinepay-adminapi
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-0.1.0}
      OTEL_TRACES_SAMPLER_RATIO: ${OTEL_TRACES_SAMPLER_RATIO:-}
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.5

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    depends_on:
      - adminapi
    environment:
      NUXT_ADMIN_API_URL: http://adminapi:8088
      NUXT_PUBLIC_APP_NAME: "OfflinePay Backoffice"
      NODE_OPTIONS: "--max-old-space-size=192"
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  bff:
    build:
      context: .
      dockerfile: backend/Dockerfile.bff
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      OFFLINEPAY_ENV: ${OFFLINEPAY_ENV:-local}
      OFFLINEPAY_LOG_FORMAT: ${OFFLINEPAY_LOG_FORMAT:-json}
      OFFLINEPAY_LOG_LEVEL: ${OFFLINEPAY_LOG_LEVEL:-info}
      BFF_HTTP_ADDR: ${BFF_HTTP_ADDR:-:8082}

      DB_URL: postgres://offlinepay:offlinepay@postgres:5432/offlinepay?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      BFF_JWT_SECRET: ${BFF_JWT_SECRET:-dev-insecure-bff-secret-change-me-0123456789}
      BFF_JWT_AUDIENCE: ${BFF_JWT_AUDIENCE:-offlinepay-user}
      BFF_ACCESS_TTL_MINUTES: ${BFF_ACCESS_TTL_MINUTES:-15}
      BFF_REFRESH_TTL_HOURS: ${BFF_REFRESH_TTL_HOURS:-168}
      BFF_OTP_TTL_MINUTES: ${BFF_OTP_TTL_MINUTES:-5}
      BFF_OTP_MAX_ATTEMPTS: ${BFF_OTP_MAX_ATTEMPTS:-5}
      BFF_RATE_LIMIT_RPS: ${BFF_RATE_LIMIT_RPS:-20}
      BFF_RATE_LIMIT_BURST: ${BFF_RATE_LIMIT_BURST:-40}
      BFF_ENABLE_DEV_TOPUP: ${BFF_ENABLE_DEV_TOPUP:-true}
      BFF_ENABLE_DEMO_MINT: ${BFF_ENABLE_DEMO_MINT:-true}
      BFF_DEVICE_SESSION_PRIVKEY: ${BFF_DEVICE_SESSION_PRIVKEY:-}
      BFF_DEVICE_SESSION_KEY_ID: ${BFF_DEVICE_SESSION_KEY_ID:-}
      MIGRATE_ON_BOOT: ${MIGRATE_ON_BOOT:-true}
      CEILING_TTL_HOURS: ${CEILING_TTL_HOURS:-24}
      AUTO_SETTLE_TIMEOUT_HOURS: ${AUTO_SETTLE_TIMEOUT_HOURS:-72}
      CLOCK_GRACE_MINUTES: ${CLOCK_GRACE_MINUTES:-30}
      SERVER_SEALED_BOX_PRIVKEY: ${SERVER_SEALED_BOX_PRIVKEY:-}
      SERVER_SEALED_BOX_PREVIOUS_PRIVKEYS: ${SERVER_SEALED_BOX_PREVIOUS_PRIVKEYS:-}
      CRYPTO_SIGNER: ${CRYPTO_SIGNER:-local}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_TRANSIT_MOUNT: ${VAULT_TRANSIT_MOUNT:-transit}
      ATTESTATION_MODE: ${ATTESTATION_MODE:-dev}

      GOMEMLIMIT: 340MiB
      GOMAXPROCS: 2

      OTEL_EXPORTER_OTLP_ENDPOINT: "tempo:4317"
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_SERVICE_NAME: offlinepay-bff
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-0.1.0}
      OTEL_TRACES_SAMPLER_RATIO: ${OTEL_TRACES_SAMPLER_RATIO:-}
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 128m
    cpus: 1.0

  transferworker:
    build:
      context: .
      dockerfile: backend/Dockerfile.transferworker
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      OFFLINEPAY_ENV: ${OFFLINEPAY_ENV:-local}
      OFFLINEPAY_LOG_FORMAT: ${OFFLINEPAY_LOG_FORMAT:-json}
      OFFLINEPAY_LOG_LEVEL: ${OFFLINEPAY_LOG_LEVEL:-info}

      DB_URL: postgres://offlinepay:offlinepay@postgres:5432/offlinepay?sslmode=disable
      NATS_URL: nats://nats:4222
      WORKER_METRICS_ADDR: ${WORKER_METRICS_ADDR:-:9102}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-16}
      WORKER_DISPATCH_INTERVAL_MS: ${WORKER_DISPATCH_INTERVAL_MS:-500}
      # FCM credentials (optional) — leave blank in .env to keep the worker on the
      # LogSender fallback. The JSON can be raw, base64-encoded, or a path *inside
      # the container* — base64 is the friction-free choice for compose.
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FCM_SERVICE_ACCOUNT_JSON: ${FCM_SERVICE_ACCOUNT_JSON:-}

      GOMEMLIMIT: 170MiB
      GOMAXPROCS: 1

      # Hardcoded — tempo container hostname.
      OTEL_EXPORTER_OTLP_ENDPOINT: "tempo:4317"
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_SERVICE_NAME: offlinepay-transferworker
      OTEL_SERVICE_VERSION: ${OTEL_SERVICE_VERSION:-0.1.0}
      OTEL_TRACES_SAMPLER_RATIO: ${OTEL_TRACES_SAMPLER_RATIO:-}
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.5

  prometheus:
    image: prom/prometheus:v2.54.1
    depends_on:
      bff:
        condition: service_started
      transferworker:
        condition: service_started
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/alertmanager/rules:/etc/prometheus/rules:ro
      - prom_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=1GB
      - --web.enable-lifecycle
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 384m
    cpus: 0.5

  alertmanager:
    image: prom/alertmanager:v0.27.0
    volumes:
      - ./ops/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - am_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25

  loki:
    image: grafana/loki:3.2.0
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./ops/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.25

  promtail:
    image: grafana/promtail:3.2.0
    command: -config.file=/etc/promtail/promtail.yml
    depends_on:
      - loki
    volumes:
      - ./ops/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yml"]
    volumes:
      - ./ops/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.5

  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD in .env}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "strict"
      GF_SERVER_ROOT_URL: "https://grafana-${PUBLIC_HOST_SUFFIX:-offlinepay.jemeel.dev}"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      # Loopback-only: reachable via SSH tunnel for LAN debug, not from other hosts.
      - "127.0.0.1:3001:3000"
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 192m
    cpus: 0.5

  metabase:
    image: metabase/metabase:v0.50.20
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_NAME: "OfflinePay Metabase"
      JAVA_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=128m"
    volumes:
      - metabase_data:/metabase-data
    networks:
      - offlinepay
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0

  caddy:
    build:
      context: ./ops/caddy
      dockerfile: Dockerfile
    environment:
      PUBLIC_HOST_SUFFIX: ${PUBLIC_HOST_SUFFIX:-offlinepay.jemeel.dev}
    depends_on:
      - bff
      - adminapi
      - dashboard
      - grafana
      - metabase
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - offlinepay
      - edge
    restart: unless-stopped
    mem_limit: 96m
    cpus: 0.25

  cloudflared:
    image: cloudflare/cloudflared:2024.10.1
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env}
    depends_on:
      - caddy
    networks:
      - edge
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25

networks:
  offlinepay:
    name: offlinepay
    driver: bridge
  edge:
    name: offlinepay-edge
    driver: bridge
    internal: false

volumes:
  pgdata:
  prom_data:
  am_data:
  grafana_data:
  loki_data:
  tempo_data:
  metabase_data:
  caddy_data:
  caddy_config:
